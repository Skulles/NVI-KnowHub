name: Build Windows App

on:
  workflow_dispatch:

jobs:
  build-windows-app:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup MSYS2 (MAC-Telnet native build)
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            base-devel
            mingw-w64-ucrt-x86_64-toolchain
            autoconf
            automake
            libtool
            pkgconf

      - name: Install dependencies
        run: npm ci

      - name: Build Windows app with MAC-Telnet
        shell: pwsh
        run: npm run electron:build:win

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: knowhub-win-build
          path: |
            release/*.exe
            release/*.blockmap
            release/win-unpacked/**
            electron/bin/win32/x64/mactelnet.exe
