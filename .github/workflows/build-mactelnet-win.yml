name: Build Windows MACTelnet

on:
  workflow_dispatch:

jobs:
  build-win-mactelnet:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build mactelnet.exe
        shell: pwsh
        run: |
          ./scripts/build-mactelnet-win.ps1 -StageToElectronBin

      - name: Upload mactelnet.exe
        uses: actions/upload-artifact@v4
        with:
          name: mactelnet-win-x64
          path: |
            artifacts/mactelnet-win/mactelnet.exe
            electron/bin/win32/x64/mactelnet.exe
